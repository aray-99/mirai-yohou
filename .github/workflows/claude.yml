# 友人委譲の自動化(DECISIONS #0076)
# Issue/PR コメントの @claude メンションで claude-code-action を起動する。
# 認証は友人(Rodan-n)発行の OAuth トークン(secrets.CLAUDE_CODE_OAUTH_TOKEN)。
# 起動は aray-99 / Rodan-n の発話に限定(公開リポジトリでのクォータ保護)。
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      contains(fromJSON('["aray-99", "Rodan-n"]'), github.actor) &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 開発フローは feature → develop(main はマイルストーン時のみ)。
          # 既定はデフォルトブランチ(main)起点のため明示する(PR #23 で顕在化)
          base_branch: develop
          # 注意: `prompt:` 入力は自動化モードに切り替わりトリガーコメント
          # (タスク本文)を読まなくなるため使わない(#0089 で顕在化 — #27 の
          # ランが 9 秒空振り)。常時遵守事項は --append-system-prompt で注入し
          # tag モードを維持する。モデルは Fable 5 を明示(#0089、成果物品質)。
          claude_args: |
            --model claude-fable-5
            --append-system-prompt "本リポジトリの常時遵守事項(Issue 本文より優先): (1) コミット件名は英語 Conventional Commits。件名に (#XXXX) 形式の DECISIONS 参照を入れない(GitHub の issue/PR 参照と誤読される)。参照は本文末尾の `Refs: docs/DECISIONS.md#XXXX` 行に書く。 (2) docs/dashboard/index.html は再生成・編集しない(オーナー実施)。 (3) 凍結ファイル(M8_frozen_config.toml、experiments/data/raw/ 配下)に触れない。触れる必要が生じたら作業を止めて報告する。 (4) Julia はこの環境で実行不可。テストはオーナーがレビュー時に実行する。 (5) 完了時は PR 作成リンクの提示まで(PR 起票はオーナーが行う)。"
